spring.application.name=auth-service
server.port=${PORT:8081}

spring.datasource.url=${AUTH_DB_URL:${SPRING_DATASOURCE_URL:jdbc:h2:mem:auth;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}}
spring.datasource.username=${AUTH_DB_USERNAME:${SPRING_DATASOURCE_USERNAME:sa}}
spring.datasource.password=${AUTH_DB_PASSWORD:${SPRING_DATASOURCE_PASSWORD:}}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.open-in-view=false

security.jwt.secret=${JWT_SECRET:local-dev-secret-please-change-32-chars}
security.jwt.expiration-seconds=${JWT_EXP_SECONDS:604800}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never
