server:
  port: 8083

spring:
  application:
    name: bidmart-auth-service
  datasource:
    url: jdbc:postgresql://localhost:5432/bidmart_auth
    username: auth_user
    password: change-me
  jpa:
    hibernate:
      ddl-auto: validate

security:
  jwt:
    issuer: bidmart-auth-service
    access-token-ttl-seconds: 900
    refresh-token-ttl-seconds: 604800
    secret: replace-with-strong-secret
